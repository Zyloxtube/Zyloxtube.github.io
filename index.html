<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encrypt JSON API</title>
<script type="module">
import forge from "https://esm.sh/node-forge@1.3.1";

function pemToForgePublicKey(pem) {
  return forge.pki.publicKeyFromPem(pem);
}

function encryptPkcs1(publicKeyPem, plaintext) {
  const pub = pemToForgePublicKey(publicKeyPem);
  const encrypted = pub.encrypt(plaintext, 'RSAES-PKCS1-V1_5');
  return forge.util.encode64(encrypted);
}

// اقرأ params من الرابط
const params = new URLSearchParams(location.search);

if (params.has('pk') && params.has('ps')) {
  const pk = params.get('pk');
  const ps = params.get('ps');

  try {
    const encrypted = encryptPkcs1(pk, ps);

    // اعرض JSON
    document.body.textContent = JSON.stringify({
      encrypted
    }, null, 2);
    document.body.style.whiteSpace = "pre";
  } catch (e) {
    document.body.textContent = JSON.stringify({
      error: e.message
    }, null, 2);
    document.body.style.whiteSpace = "pre";
  }
} else {
  document.body.textContent =
    'Use ?pk=PUBLIC_KEY&ps=TEXT in URL';
}
</script>
</head>
<body></body>
</html>
