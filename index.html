<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="module">
import forge from "https://esm.sh/node-forge@1.3.1";

function encryptPkcs1(publicKeyPem, plaintext) {
  const pub = forge.pki.publicKeyFromPem(publicKeyPem);
  const encrypted = pub.encrypt(plaintext, 'RSAES-PKCS1-V1_5');
  return forge.util.encode64(encrypted);
}

async function run() {
  const params = new URLSearchParams(location.search);
  const pk = params.get("pk");
  const ps = params.get("ps");

  let result;

  try {
    if (!pk || !ps) {
      result = { error: "missing pk or ps" };
    } else {
      const encrypted = encryptPkcs1(pk, ps);
      result = { encrypted };
    }
  } catch (e) {
    result = { error: e.message };
  }

  document.body.textContent = JSON.stringify(result);
}

run();
</script>
</head>
<body></body>
</html>
